<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="wrapper">
        <div class="display-wrapper">    
            <div id="upper-display">0</div>
            <div id="display">0</div>
            
        </div>
        <div class="buttons">
            <button class="manage-btn" data-type="manage" data-value="mode">⏾</button>
            <button class="manage-btn" data-type="manage" data-value="backspace">←</button>
            <button class="manage-btn" data-type="manage" data-value="clean">CE</button>
            <button class="manage-btn" data-type="manage" data-value="power">⏻</button>
            
            <button class="number-btn" data-type="number" data-value="7">7</button>
            <button class="number-btn" data-type="number" data-value="8">8</button>
            <button class="number-btn" data-type="number" data-value="9">9</button>
            <button class="operator-btn" data-type="operator" data-value="divide">÷</button>

            <button class="number-btn" data-type="number" data-value="4">4</button>
            <button class="number-btn" data-type="number" data-value="5">5</button>
            <button class="number-btn" data-type="number" data-value="6">6</button>
            <button class="operator-btn" data-type="operator" data-value="multiply">x</button>

            <button class="number-btn" data-type="number" data-value="1">1</button>
            <button class="number-btn" data-type="number" data-value="2">2</button>
            <button class="number-btn" data-type="number" data-value="3">3</button>
            <button class="operator-btn" data-type="operator" data-value="minus">-</button>

            <button class="number-btn" data-type="number" data-value="0">0</button>
            <button class="manage-btn" data-type="manage" data-value="dot">•</button>
            <button class="manage-btn" data-type="operator" data-value="equal">=</button>
            <button class="operator-btn" data-type="operator" data-value="plus">+</button>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
